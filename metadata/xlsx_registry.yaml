    scheme: GD1
    parser: wide_period_metric
    entity_column_index: 0
    column_pattern: '^Y(?P<period>\d+)\s+(?P<kind>Expenditure|Allowance)$'
    kind_metric_map:
      Expenditure: actual_totex_million_gbp
      Allowance: totex_allowance_million_gbp
    unit: million_GBP

  - file: Fuel_poor_connections_Gas_distribution_RIIO-GD1.xlsx
    raw_table: raw_xlsx_fuel_poor
    network_sector: Gas Distribution
    scheme: GD1
    parser: columnar_snapshot
    snapshot_year: 2021       # 7-year cumulative through end of GD1
    entity_column_index: 0
    metric_map:
      "Commitment (7 year cumulative)": fuel_poor_connections_target
      "Actual (7 year cumulative)": fuel_poor_connections_actual
    unit: count

  - file: Network_availability_Gas_distribution_RIIO-GD1.xlsx
    raw_table: raw_xlsx_network_availability
    network_sector: Gas Distribution
    scheme: GD1
    parser: wide_period_metric
    entity_column_index: 0
    column_pattern: '^Year\s+(?P<period>\d+)\s+\([\d\-]+\)$'
    kind_metric_map:
      "_default": network_availability_pct
    unit: percent

  - file: Return_on_regulatory_equity_Gas_distribution_RIIO-GD1.xlsx
    raw_table: raw_xlsx_rore
    network_sector: Gas Distribution
    scheme: GD1
    parser: columnar_snapshot
    snapshot_year: 2021
    entity_column_index: 0
    metric_map:
      "Current eight-year view": rore_pct
    metric_map_substring: true
