    kind_metric_map:
      "on time": connections_on_time_count
      "not on time": connections_late_count
    unit: count

  - file: Return_on_regulatory_equity_Electricity_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_rore
    network_sector: Electricity Transmission
    scheme: T1
    parser: columnar_snapshot
    snapshot_year: 2021
    entity_column_index: 0
    metric_map:
      "Current eight-year view": rore_pct
    metric_map_substring: true
    unit: percent

  - file: Sulphur_Hexafluoride_SF6_emissions_Electricity_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_emissions
    network_sector: Electricity Transmission
    scheme: T1
    parser: wide_period_metric
    entity_column_index: 0
    column_pattern: '^Y(?P<period>\d+)\s+(?P<kind>Actual|Target)\s+emissions$'
    kind_metric_map:
      Actual: sf6_kg
      Target: sf6_target_kg
    unit: kg

  - file: Volume_of_energy_not_supplied_Electricity_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_reliability
    network_sector: Electricity Transmission
    scheme: T1
    parser: wide_period_metric
    entity_column_index: 0
    column_pattern: '^Year\s+(?P<period>\d+)\s+(?P<kind>actual|target)$'
    kind_metric_map:
      actual: ens_mwh
      target: ens_target_mwh
    unit: MWh

  # ============================================================
  # GAS TRANSMISSION (RIIO-T1)
  # ============================================================

  - file: Business_carbon_footprint_Gas_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_emissions
    network_sector: Gas Transmission
    scheme: T1
    parser: year_label_long
    entity_column_index: 0
    fixed_company_name: National Grid Gas Transmission
    metric_map:
      "Scope 1": ghg_scope1_tco2e
      "Scope 2": ghg_scope2_tco2e
      "Scope 3": ghg_scope3_tco2e
    unit: tCO2e

  - file: Customer_satisfaction_Gas_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_customer_satisfaction
    network_sector: Gas Transmission
    scheme: T1
    parser: year_label_long
    entity_column_index: 0
    fixed_company_name: National Grid Gas Transmission
    metric_map:
      "stakeholder engagement": stakeholder_engagement_score
      "stakeholder survey": stakeholder_survey_score
      "customer survey": customer_survey_score
    metric_map_substring: true
    unit: score

  - file: Expenditure_vs_allowance_Gas_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_expenditure
    network_sector: Gas Transmission
    scheme: T1
    parser: year_label_long
    entity_column_index: 0
    fixed_company_name: National Grid Gas Transmission
    metric_map:
      "Allowance": totex_allowance_million_gbp
      "Expenditure": actual_totex_million_gbp
    metric_map_substring: true
    unit: million_GBP

  - file: Network_connections_Gas_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_connections
    network_sector: Gas Transmission
    scheme: T1
    parser: year_label_long
    entity_column_index: 0
    fixed_company_name: National Grid Gas Transmission
    metric_map:
      "Connection Offers Received": connection_offers_received
      "Offers made or processing": connection_offers_processed
    metric_map_substring: true
    unit: count

  - file: Network_reliability_Gas_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_reliability
    network_sector: Gas Transmission
    scheme: T1
    parser: year_label_long
    entity_column_index: 0
    fixed_company_name: National Grid Gas Transmission
    metric_map:
      "Target": gas_reliability_target_pct
      "Actual": gas_reliability_pct
    unit: percent

  - file: Return_on_regulatory_equity_Gas_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_rore
    network_sector: Gas Transmission
    scheme: T1
    parser: columnar_snapshot
    snapshot_year: 2021
    entity_column_index: 0
    metric_map:
      "Current eight-year view": rore_pct
    metric_map_substring: true
    unit: percent

  # ============================================================
  # GAS DISTRIBUTION (RIIO-GD1)
