# -----------------------------------------------------------------------------
# Policy / scheme metrics -> raw_xlsx_scheme_metric (optional portal files)
#
# Parsers:
#   scheme_metric_long :
#       Like time_series_long: col 0 = period (date or year), remaining cols are
#       metrics. Requires scheme_key and metric_map (column headers -> metric names).
#   scheme_period_supplier_matrix :
#       Like period_supplier_matrix: col 0 = period; each other column is an entity
#       (supplier / energy company). Uses metric_name for the measure in cells.
#
# Example (place workbook under data/ofgem_data_portal_xlsx/ then uncomment):
# - file: Boiler_Upgrade_Scheme_monthly_applications_and_vouchers.xlsx
#   raw_table: raw_xlsx_scheme_metric
#   parser: scheme_metric_long
#   scheme_key: BUS
#   date_format: month_year_short
#   metric_map:
#     "Applications submitted": applications_submitted
#     "Vouchers issued": vouchers_issued
#   unit: count
#
# - file: ECO3_supplier_obligation_progress.xlsx
#   raw_table: raw_xlsx_scheme_metric
#   parser: scheme_period_supplier_matrix
#   scheme_key: ECO3
#   period_kind: year
#   metric_name: obligation_progress_pct
#   unit: percent
