# Registry of the 38 Ofgem Data Portal xlsx files in data/ofgem_data_portal_xlsx/.
#
# Each entry tells pipeline/ingest/load_xlsx.py:
#   - which raw_xlsx_* table the rows belong in
#   - which network_sector tag to attach
#   - the RIIO scheme (used to translate "Year N" -> calendar year)
#   - which parser strategy to use
#   - parser-specific configuration
#
# Parser strategies (handled in load_xlsx.py):
#   wide_period_metric  : entity in col 0; remaining columns encode (period, kind)
#                         via `column_pattern` regex with named groups.
#                         `kind_metric_map` translates the regex `kind` group
#                         into a canonical metric name. If `period` is a Year N
#                         token, the scheme is used to compute calendar year.
#                         If `period` is an FY token (13/14, 2013-14), it is
#                         resolved via metadata/riio_periods.yaml directly.
#   year_label_long     : col 0 is a year/FY label, every other column is a
#                         metric. `metric_map` renames headers to canonical.
#   columnar_snapshot   : no period dimension in the data; an explicit
#                         `snapshot_year` is used. col 0 is entity, remaining
#                         cols are metrics renamed via `metric_map`.
#   time_series_long    : col 0 is a date string; other cols are metrics. Date
#                         parsed via `date_format`. Loader records the date and
#                         a derived integer year for annual roll-ups.
#   multi_year_unpivot  : col 0 is a date or week index. Each subsequent column
#                         header encodes a year via `year_pattern`. Output has
#                         one row per (period_index, year, value) for the
#                         single metric `metric_name`.

defaults:
  data_dir: data/ofgem_data_portal_xlsx
  sheet_name: Sheet1
  header_row: 0       # 0-indexed
  data_start_row: 1   # 0-indexed

files:

  # ============================================================
  # ELECTRICITY DISTRIBUTION (RIIO-ED1)
  # ============================================================

  - file: Average_time_to_connect_to_the_network_Electricity_distribution_RIIO-ED1.xlsx
    raw_table: raw_xlsx_connections
    network_sector: Electricity Distribution
    scheme: ED1
    parser: columnar_snapshot
    snapshot_year: 2020       # header references "(2019/20)" -> end FY 2020
    entity_column_index: 0
    metric_map:
      "LVSSA target": connection_lvssa_target_days
      "LVSSA (2019/20)": connection_lvssa_actual_days
      "LVSSB target": connection_lvssb_target_days
      "LVSSB (2019/20)": connection_lvssb_actual_days
    unit: days

  - file: Customer_interruptions_and_minutes_lost_Electricity_distribution_RIIO-ED1.xlsx
    raw_table: raw_xlsx_reliability
    network_sector: Electricity Distribution
    scheme: ED1
    parser: columnar_snapshot
    snapshot_year: 2020
    entity_column_index: 0
    metric_map:
      "Target for customers interrupted": customer_interruptions_target
      "Actual number of customers interrupted": customer_interruptions
      "Target average minutes lost": minutes_lost_target
      "Actual average minutes lost": minutes_lost
    metric_map_substring: true   # match by header substring
    unit: count_or_minutes

  - file: Customer_satisfaction_with_network_operators_Electricity_distribution_RIIO-ED1.xlsx
    raw_table: raw_xlsx_customer_satisfaction
    network_sector: Electricity Distribution
    scheme: ED1
    parser: columnar_snapshot
    snapshot_year: 2020
    entity_column_index: 0
    metric_map:
      "Stakeholder engagement incentive reward score": stakeholder_engagement_score
      "Customer survey score": customer_survey_score
    metric_map_substring: true
    unit: score

  - file: Expenditure_vs_allowance_Electricity_distribution_RIIO-ED1.xlsx
    raw_table: raw_xlsx_expenditure
    network_sector: Electricity Distribution
    scheme: ED1
    parser: wide_period_metric
    entity_column_index: 0
    column_pattern: '^Year\s+(?P<period>\d+)\s+(?P<kind>expenditure|allowance)$'
    kind_metric_map:
      expenditure: actual_totex_million_gbp
      allowance: totex_allowance_million_gbp
    unit: million_GBP

  - file: Return_on_regulatory_equity_Electricity_distribution_RIIO-ED1.xlsx
    raw_table: raw_xlsx_rore
    network_sector: Electricity Distribution
    scheme: ED1
    parser: columnar_snapshot
    snapshot_year: 2023       # 8-year RIIO-ED1 view ends 2023
    entity_column_index: 0
    metric_map:
      "Current eight year view": rore_pct
    metric_map_substring: true
    unit: percent

  # Portal exports alternate between multi-year "Year 1 … Year 8" sheets and a
  # single **Length of installations (km)** snapshot (two-column table). The
  # snapshot layout must use columnar_snapshot; register snapshot_year **2019**
  # so the dashboard lag merge (undergrounding Y vs ED CML Y+1) lines up with
  # Customer_interruptions… ED1 which uses snapshot_year **2020** for minutes_lost.
  # If Ofgem ships Year N columns again, switch back to wide_period_metric + Year regex.
  - file: Undergrounding_of_overhead_lines_Electricity_distribution_RIIO-ED1.xlsx
    raw_table: raw_xlsx_undergrounding
    network_sector: Electricity Distribution
    scheme: ED1
    parser: columnar_snapshot
    snapshot_year: 2019
    entity_column_index: 0
    metric_map:
      "Length of installations": undergrounding_km
    metric_map_substring: true
    unit: km

  # ============================================================
  # ELECTRICITY TRANSMISSION (RIIO-T1)
  # ============================================================

  - file: Customer_satisfaction_with_network_owners_Electricity_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_customer_satisfaction
    network_sector: Electricity Transmission
    scheme: T1
    parser: wide_period_metric
    entity_column_index: 0
    column_pattern: '^Year\s+(?P<period>\d+)\s+(?P<kind>.+)$'
    kind_metric_map_substring: true
    kind_metric_map:
      "stakeholder engagement": stakeholder_engagement_score
      "stakeholder survey": stakeholder_survey_score
      "customer survey": customer_survey_score
    unit: score

  - file: Expenditure_vs_allowance_Electricity_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_expenditure
    network_sector: Electricity Transmission
    scheme: T1
    parser: wide_period_metric
    entity_column_index: 0
    column_pattern: '^Year\s+(?P<period>\d+)\s+(?P<kind>expenditure|allowance)$'
    kind_metric_map:
      expenditure: actual_totex_million_gbp
      allowance: totex_allowance_million_gbp
    value_multiplier: 1000.0      # source values look like £bn -> convert to £m
    unit: million_GBP

  - file: Network_connections_by_transmission_owners_Electricity_transmission_RIIO-T1.xlsx
    raw_table: raw_xlsx_connections
