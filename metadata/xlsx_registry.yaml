  - file: Volume_of_gas_lost_from_the_distribution_network_RIIO-GD1.xlsx
    raw_table: raw_xlsx_reliability
    network_sector: Gas Distribution
    scheme: GD1
    parser: wide_period_metric
    entity_column_index: 0
    column_pattern: '^(?P<kind>Target|Actual)\s+(?P<fy>\d+/\d+)$'
    period_from_fy: true
    kind_metric_map:
      Actual: gas_lost_volume
      Target: gas_lost_target_volume
    unit: GWh

  # ============================================================
  # GB MARKET CONTEXT (no RIIO scheme)
  # ============================================================

  - file: Electricity_bid-offer_spreads_by_contract_type_GB.xlsx
    raw_table: raw_xlsx_market_prices
    network_sector: Electricity Wholesale
    scheme: null
    parser: multi_year_unpivot
    entity_column_index: 0          # Isoweeknum
    period_kind: isoweek
    year_pattern: '(?P<year>\d{4})|all years pre-(?P<year_pre>\d{4})'
    pre_year_label: pre_2021
    metric_name: bid_offer_spread
    commodity: electricity
    unit: GBP_per_MWh

  - file: Electricity_generation_mix_by_quarter_and_fuel_source_GB.xlsx
    raw_table: raw_xlsx_generation_mix
    network_sector: Electricity Wholesale
    scheme: null
    parser: time_series_long
    entity_column_index: 0
    date_format: quarterly        # "Q1 1998" style
    fuel_columns_as_metric: true
    default_metric_name: generation_share_twh
    commodity: electricity
    unit: TWh

  - file: Electricity_trading_volumes_and_churn_ratio_by_month_and_platform_GB.xlsx
