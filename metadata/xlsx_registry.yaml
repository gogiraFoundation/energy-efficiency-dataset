    entity_column_index: 0
    date_format: dayfirst
    metric_map:
      "Spark (low efficiency)": spark_spread_low
      "Spark (central efficiency)": spark_spread_central
      "Spark (high efficiency)": spark_spread_high
      "Dark": dark_spread
      "Power price (baseload)": power_price_baseload
