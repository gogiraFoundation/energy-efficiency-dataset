# DUKES Chapter 1 (Digest of UK Energy Statistics) — DESNZ / GOV.UK
# Source collection: https://www.gov.uk/government/statistics/energy-chapter-1-digest-of-united-kingdom-energy-statistics-dukes
# Files are fetched into paths.dukes_dir when missing (see pipeline/config/settings.yaml).

version: dukes_2025_chapter1

# 1 Mtoe ≈ 11.63 TWh (UK energy statistics convention)
mtoe_to_twh: 11.63
# 1 ktoe ≈ 0.01163 TWh
ktoe_to_twh: 0.01163

tables:
  primary_consumption_gdp:
    table_id: "1.1.4"
    url: "https://assets.publishing.service.gov.uk/media/6889eb22a11f8599944091ec/DUKES_1.1.4.xlsx"
    filename: "DUKES_1.1.4.xlsx"
    sheet: "1.1.4"
    header_row_0indexed: 4
    data_start_row_0indexed: 5

  expenditure_final_user:
    table_id: "1.1.6"
    url: "https://assets.publishing.service.gov.uk/media/6889eb3de1a850d72c4091dc/DUKES_1.1.6.xlsx"
    filename: "DUKES_1.1.6.xlsx"
    sheet: "1.1.6"
    header_row_0indexed: 5
    data_start_row_0indexed: 6

  final_consumption_by_user:
    table_id: "1.1.5"
    url: "https://assets.publishing.service.gov.uk/media/6889eb2f8b3a37b63e738fe3/DUKES_1.1.5.xlsx"
    filename: "DUKES_1.1.5.xlsx"
    sheets:
      - sheet: "1.1.5 Industry"
        sector: Industry
      - sheet: "1.1.5 Transport"
        sector: Transport
      - sheet: "1.1.5 Domestic"
        sector: Domestic
      - sheet: "1.1.5 Other Final Users"
        sector: Other final users
      - sheet: "1.1.5 All Final Users"
        sector: All final users
    header_row_0indexed: 5
    data_start_row_0indexed: 6

  primary_fuels_mtoe:
    table_id: "1.1.1.B"
    url: "https://assets.publishing.service.gov.uk/media/6889eafc76f68cc8414d5b55/DUKES_1.1.1.xlsx"
    filename: "DUKES_1.1.1.xlsx"
    sheet: "1.1.1.B"
    # Row index (0-based) where years appear as column headers
    header_year_row_0indexed: 6
    # Fuel rows start after header row
    data_start_row_0indexed: 7

# -----------------------------------------------------------------------------
# DUKES Chapter 1 — supplementary (balances, sales, availability; long format → stg_dukes_chapter1_sup)
# -----------------------------------------------------------------------------
chapter1_sup:
  version: dukes_2025_chapter1_sup
  tables:
    dukes_1_1:
      table_id: "1.1"
      url: "https://assets.publishing.service.gov.uk/media/6889eab08b3a37b63e738fdf/DUKES_1.1.xlsx"
      filename: "DUKES_1.1.xlsx"
      parser: commodity_year_sheets
      sheet_name_regex: "^\\d{4}$"
      header_row_0indexed: 3
      data_start_row_0indexed: 4
      metric_name: commodity_balance_ktoe
      unit: ktoe

    dukes_1_1_alternative_units:
      table_id: "1.1au"
      url: "https://assets.publishing.service.gov.uk/media/688b4c2117af69a639ebe68e/DUKES_1.1_alternative_units.xlsx"
      filename: "DUKES_1.1_alternative_units.xlsx"
      parser: aggregate_balance_alternative_units
      sheet_name_regex: "^\\d{4}$"
      fuel_header_row_0indexed: 2
      data_start_row_0indexed: 4
      block1_col_range: [1, 11]
      block2_col_range: [17, 27]

    dukes_1_2:
      table_id: "1.2"
      url: "https://assets.publishing.service.gov.uk/media/6889eae16478525675738fcc/DUKES_1.2.xlsx"
      filename: "DUKES_1.2.xlsx"
      parser: commodity_year_sheets
      sheet_name_regex: "^\\d{4}$"
      header_row_0indexed: 2
      data_start_row_0indexed: 3
      metric_name: value_balance_million_gbp
      unit: million_gbp

    dukes_1_3:
      table_id: "1.3"
      url: "https://assets.publishing.service.gov.uk/media/6889eaed8b3a37b63e738fe1/DUKES_1.3.xlsx"
      filename: "DUKES_1.3.xlsx"
      parser: sales_year_columns
      # 1.3.A = £m totals; 1.3.B = average net selling value (p/kWh)
      sheets:
        - sheet: "1.3.A"
          metric_name: sales_million_gbp
          unit: million_gbp
        - sheet: "1.3.B"
          metric_name: average_net_selling_value_p_per_kwh
          unit: pence_per_kwh
      header_row_0indexed: 4
      data_start_row_0indexed: 5

    dukes_1_1_2:
      table_id: "1.1.2"
      url: "https://assets.publishing.service.gov.uk/media/6889eb088b3a37b63e738fe2/DUKES_1.1.2.xlsx"
      filename: "DUKES_1.1.2.xlsx"
      parser: wide_year_rows
      sheet: "1.1.2"
      header_row_0indexed: 5
      data_start_row_0indexed: 6
      metric_name: primary_fuels_availability_ktoe
      unit: ktoe

    dukes_1_1_3:
      table_id: "1.1.3"
      url: "https://assets.publishing.service.gov.uk/media/6889eb156478525675738fce/DUKES_1.1.3.xlsx"
      filename: "DUKES_1.1.3.xlsx"
      parser: simple_year_metrics
      sheet: "1.1.3"
      header_row_0indexed: 5
      data_start_row_0indexed: 6
      metric_prefix: import_export_balance

    dukes_1_1_1_extra:
      table_id: "1.1.1.AC"
      url: "https://assets.publishing.service.gov.uk/media/6889eafc76f68cc8414d5b55/DUKES_1.1.1.xlsx"
      filename: "DUKES_1.1.1.xlsx"
      parser: fuel_by_year_matrix
      sheets:
        - "1.1.1.A"
        - "1.1.1.C"
      header_row_0indexed: 6
      data_start_row_0indexed: 7
      metric_name: inland_consumption_by_year
      unit: mixed

    dukes_I_1:
      table_id: "I.1"
      url: "https://assets.publishing.service.gov.uk/media/6889eb4b6478525675738fcf/DUKES_I.1.xlsx"
      filename: "DUKES_I.1.xlsx"
      parser: commodity_year_sheets
      sheet_name_regex: "^\\d{4}$"
      header_row_0indexed: 3
      data_start_row_0indexed: 4
      metric_name: commodity_balance_net_cv_ktoe
      unit: ktoe

    dukes_J_1:
      table_id: "J.1"
      url: "https://assets.publishing.service.gov.uk/media/68a5e0772a1dfc29763d5179/DUKES_J.1.xlsx"
      filename: "DUKES_J.1.xlsx"
