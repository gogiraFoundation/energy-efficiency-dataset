sources:
  - source_id: ofgem_ens_et
    name: Ofgem Electricity Transmission ENS
    domain: ofgem
    default_format: csv
    frequency: annual
    fetch_mode: http
    url: https://www.ofgem.gov.uk/news-and-insight/data/data-portal/energy-network-indicators
    raw_table: raw_ofgem_ens
    description: Volume of energy not supplied for electricity transmission.

  - source_id: ofgem_expenditure_allowance
    name: Ofgem Expenditure vs Allowance
    domain: ofgem
    default_format: csv
    frequency: annual
    fetch_mode: http
    url: https://www.ofgem.gov.uk/news-and-insight/data/data-portal/energy-network-indicators
    raw_table: raw_ofgem_expenditure
    description: Expenditure and allowance series for RIIO entities.

  - source_id: ofgem_rore
    name: Ofgem Return on Regulatory Equity
    domain: ofgem
    default_format: csv
    frequency: annual
    fetch_mode: http
    url: https://www.ofgem.gov.uk/news-and-insight/data/data-portal/energy-network-indicators
    raw_table: raw_ofgem_rore
    description: RoRE by owner and network sector.

  - source_id: ofgem_customer_metrics
    name: Ofgem customer cost and satisfaction
    domain: ofgem
    default_format: csv
    frequency: annual
    fetch_mode: http
    url: https://www.ofgem.gov.uk/news-and-insight/data/data-portal/energy-network-indicators
    raw_table: raw_ofgem_customer_metrics
    description: Customer interruptions, minutes lost, satisfaction, and cost per customer.

  - source_id: ofgem_emissions
    name: Ofgem network emissions
    domain: ofgem
    default_format: csv
    frequency: annual
    fetch_mode: http
    url: https://www.ofgem.gov.uk/news-and-insight/data/data-portal/energy-network-indicators
    raw_table: raw_ofgem_emissions
    description: SF6 and carbon footprint by network company.

  - source_id: ons_energy_intensity
    name: ONS Energy intensity by industry
    domain: ons
    default_format: csv
    frequency: annual
    fetch_mode: http
    url: https://www.ons.gov.uk/
    raw_table: raw_ons_energy_intensity
    description: kWh per GBP GVA by SIC industry group.

  - source_id: ons_sector_fuel_use
    name: "ONS Energy use: total (industry)"
    domain: ons
    default_format: xlsx
    frequency: annual
    fetch_mode: manual
    url: https://www.ons.gov.uk/economy/environmentalaccounts/datasets/ukenvironmentalaccountstotalenergyconsumptionbyindustry
    raw_table: raw_ons_sector_fuel_use
    description: UK direct/reallocated energy use by SIC section (1990-2023); transform into electricity_pct/gas_pct contract before load_raw.

  - source_id: ons_regional_gva
    name: ONS regional GVA by industry
    domain: ons
    default_format: csv
    frequency: annual
    fetch_mode: http
    url: https://www.ons.gov.uk/
    raw_table: raw_ons_regional_gva
    description: Regional GVA used for ENS-to-output bridge.

  - source_id: ons_lcree
    name: ONS Low Carbon Renewable Energy Economy
    domain: ons
    default_format: xlsx
    frequency: annual
    fetch_mode: manual
    url: https://www.ons.gov.uk/economy/environmentalaccounts/datasets/lowcarbonandrenewableenergyeconomyfirstestimatesdataset
    raw_table: raw_ons_lcree
    description: LCREE turnover used for narrative context only.

  - source_id: ons_intermediate_consumption
    name: ONS Intermediate consumption proportions by industry
    domain: ons
    default_format: xlsx
    frequency: annual
    fetch_mode: http
    url: https://www.ons.gov.uk/file?uri=/economy/nationalaccounts/supplyandusetables/datasets/inputoutputsupplyandusetables/current/previous/v17/supublicationtablesbb24.xlsx
    raw_table: raw_ons_intermediate_consumption
    description: Input-output intermediate consumption shares by industry and commodity.

  - source_id: ons_gas_sap_daily
    name: ONS System Average Price (SAP) of gas
    domain: ons
    default_format: xlsx
    frequency: daily
    fetch_mode: http
    url: https://www.ons.gov.uk/file?uri=/economy/economicoutputandproductivity/output/datasets/systemaveragepricesapofgas/2026/previous/v16/systemaveragepriceofgasdataset230426.xlsx
    raw_table: raw_daily_market_prices
    description: Daily gas SAP and rolling seven-day averages from OCM trades.

  - source_id: elexon_system_price_daily
    name: Elexon electricity System Price daily extract
    domain: elexon
    default_format: csv
    frequency: daily
    fetch_mode: manual
    url: https://developer.data.elexon.co.uk/
    raw_table: raw_daily_market_prices
    description: Daily electricity system price extracted from Elexon Insights datasets.
